name: Policy Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
    uses: browserbee/.github/.github/workflows/semantic-release.yml@main

  publish-policy:
    permissions:
      contents: read
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    uses: browserbee/.github/.github/workflows/publish-policy-bundle.yml@main
    with:
      version: ${{ needs.release.outputs.new-release-version }}
      policy-path: policy
